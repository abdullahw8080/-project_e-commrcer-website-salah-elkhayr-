<body>
    <div class="container">
        <h1>تقرير العملاء والنشاط</h1>
        
        <div class="filter-section">
            <div class="filter-group">
                <label for="user-type">نوع العميل:</label>

                <label for="activity">النشاط:</label>

                    <option value="all">الكل</option>
                    <option value="active">نشط</option>

                </select>
                
                <button class="btn" onclick="loadCustomers()">تطبيق الفلتر</button>
            </div>
            
            <div>
                <button class="btn" onclick="exportCustomers()">تصدير البيانات</button>
            </div>
        </div>
        
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-label">إجمالي العملاء</div>

            </div>
            <div class="stat-card">
                <div class="stat-label">عملاء نشطون</div>
                <div class="stat-value" id="active-customers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">عملاء جدد (شهر)</div>
                <div class="stat-value" id="new-customers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">متوسط المشتريات</div>
                <div class="stat-value" id="avg-orders">0</div>
            </div>
        </div>
        
        <canvas id="customerChart" height="100"></canvas>
        
        <table id="customers-table">
            <thead>
                <tr>
                    <th>رقم العميل</th>
                    <th>اسم العميل</th>
                    <th>البريد الإلكتروني</th>
                    <th>الهاتف</th>
                    <th>عدد الطلبات</th>
                    <th>إجمالي المشتريات</th>
                    <th>آخر نشاط</th>
                    <th>النوع</th>
                </tr>
            </thead>
            <tbody id="customers-data">
                <!-- سيتم ملء البيانات هنا -->
            </tbody>
        </table>
    </div>

    <script>
        let customerChart;
        
        // دالة لتحميل إحصائيات العملاء
        function loadCustomerStats() {
            fetch('get_customer_stats.php')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('total-customers').textContent = data.total_customers;
                    document.getElementById('active-customers').textContent = data.active_customers;
                    document.getElementById('new-customers').textContent = data.new_customers;
                    document.getElementById('avg-orders').textContent = data.avg_orders_per_customer.toFixed(1);
                    
                    updateCustomerChart(data);
                });
        }
        
        // دالة لتحميل بيانات العملاء
        function loadCustomers() {
            const userType = document.getElementById('user-type').value;
            const activity = document.getElementById('activity').value;
            
            fetch(`get_customers.php?user_type=${userType}&activity=${activity}`)
                .then(response => response.json())
                .then(data => {
                    displayCustomersData(data.customers);
                });
        }
        
        // دالة لعرض بيانات العملاء في الجدول
        function displayCustomersData(customers) {
            const tableBody = document.getElementById('customers-data');
            tableBody.innerHTML = '';
            
            customers.forEach(customer => {
                const row = document.createElement('tr');
                
                // تحديد نوع العميل
                let typeClass = 'regular';
                let typeText = 'عادي';
                if (customer.Type_user_id == 2) {
                    typeClass = 'new';
                    typeText = 'مسؤول';
                } else if (customer.last_activity_days > 90) {
                    typeClass = 'inactive';
                    typeText = 'غير نشط';
                }
                
                row.innerHTML = `
                    <td>${customer.User_id}</td>
                    <td>${customer.User_name}</td>
                    <td>${customer.User_email}</td>
                    <td>${customer.User_phone}</td>
                    <td>${customer.order_count || 0}</td>
                    <td>${customer.total_spent || 0} ر.س</td>
                    <td>${customer.last_activity || 'لا يوجد'}</td>
                    <td><span class="customer-type ${typeClass}">${typeText}</span></td>
                `;
                tableBody.appendChild(row);
            });
        }
        
        // دالة لتحديث الرسم البياني للعملاء
        function updateCustomerChart(data) {
            const ctx = document.getElementById('customerChart').getContext('2d');
            
            if (customerChart) {
                customerChart.destroy();
            }
            
            customerChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['عملاء عاديون', 'مسؤولون', 'عملاء جدد', 'عملاء غير نشطين'],
                    datasets: [{
                        label: 'عدد العملاء',
                        data: [
                            data.regular_customers,
                            data.admin_customers,
                            data.new_customers,
                            data.inactive_customers
                        ],
                        backgroundColor: [
                            'rgba(54, 162, 235, 0.7)',
                            'rgba(255, 99, 132, 0.7)',
                            'rgba(75, 192, 192, 0.7)',
                            'rgba(255, 159, 64, 0.7)'
                        ],
                        borderColor: [
                            'rgba(54, 162, 235, 1)',
                            'rgba(255, 99, 132, 1)',
                            'rgba(75, 192, 192, 1)',
                            'rgba(255, 159, 64, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: {
                            display: true,
                            text: 'توزيع العملاء'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }
        
        function exportCustomers() {
            alert('سيتم تصدير بيانات العملاء');
            // تنفيذ تصدير البيانات هنا
        }
        
        // تحميل البيانات عند فتح الصفحة
        window.onload = function() {
            loadCustomerStats();
            loadCustomers();
        };
    </script>
